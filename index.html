<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>焦虑外包器 - 把焦虑交给AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 50%, #e8eaf6 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #00897b;
            font-size: 28px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        textarea {
            width: 100%;
            height: 120px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }
        textarea:focus {
            border-color: #00897b;
        }
        .btn {
            background: linear-gradient(135deg, #00897b, #26a69a);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,137,123,0.3);
        }
        .result {
            margin-top: 30px;
            padding: 20px;
            background: #f5f5f5;
            border-radius: 12px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result-text {
            font-size: 16px;
            color: #333;
            line-height: 1.8;
        }
        .emoji {
            font-size: 48px;
            margin-bottom: 10px;
        }
        .footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        .footer p {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .footer-links {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .footer-link {
            background: #f5f5f5;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            color: #00897b;
            text-decoration: none;
        }
        .share-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }
        .share-section p {
            color: #666;
            font-size: 14px;
            margin-bottom: 12px;
        }
        .share-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .share-btn {
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            border: none;
            transition: transform 0.2s;
        }
        .share-btn:hover {
            transform: translateY(-2px);
        }
        .share-xiaohongshu {
            background: #ff2442;
            color: white;
        }
        .share-weibo {
            background: #ff6b00;
            color: white;
        }
        .share-generate {
            background: #00897b;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🌊</div>
        <h1>焦虑外包器</h1>
        <p class="subtitle">把焦虑交给AI，你只需要放心</p>
        
        <textarea id="anxiety" placeholder="输入最近让你焦虑的事..."></textarea>
        <button class="btn" onclick="outsource()">外包给AI 🤖</button>
        
        <div class="result" id="result">
            <div class="emoji" id="resultEmoji">✨</div>
            <p class="result-text" id="resultText"></p>
        </div>
        
        <div class="footer">
            <p>我是<span style="color:#00897b;font-weight:600">清溪</span>，关注我获取更多AI提效技巧 👇</p>
            <div class="footer-links">
                <a href="https://xhslink.com/m/3pdBcBDfYmx" class="footer-link">📕 小红书</a>
                <a href="https://v.douyin.com/fZNLm0iCwfA/" class="footer-link">🎬 抖音</a>
                <a href="https://qingxihub.com/tools" class="footer-link">🛠️ AI工具箱</a>
            </div>
            <div class="share-section">
                <p>分享给朋友 👇</p>
                <div class="share-buttons">
                    <button class="share-btn share-xiaohongshu" onclick="shareToXiaohongshu()">📕 小红书</button>
                    <button class="share-btn share-weibo" onclick="shareToWeibo()">🌐 某浪</button>
                    <button class="share-btn share-generate" onclick="generateShareImage()">🖼️ 生成分享图</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const replies = [
            "你的焦虑已被AI接收，已外包处理，请放心 ~",
            "来自未来的消息：你现在担心的事，90%不会发生。",
            "焦虑已被打包，现在可以深呼吸了 🌬️",
            "你的焦虑已进入AI处理队列，预计2分钟内消失 ~",
            "别担心，AI已经帮你想好了：顺其自然就好 🌊"
        ];

        function outsource() {
            const anxiety = document.getElementById('anxiety').value.trim();
            if (!anxiety) {
                alert('先说说你在焦虑什么 ~');
                return;
            }
            const reply = replies[Math.floor(Math.random() * replies.length)];
            document.getElementById('resultText').textContent = reply;
            document.getElementById('result').classList.add('show');
        }

        function shareToXiaohongshu() {
            const text = '我发现了一个人工智能焦虑外包器，把焦虑交给AI，轻松多了！🌊✨';
            const url = 'https://qingxihub.com/anxiety';
            window.open(`https://www.xiaohongshu.com/explore?url=${encodeURIComponent(url)}&title=${encodeURIComponent(text)}`, '_blank');
        }

        function shareToWeibo() {
            const text = '我发现了一个人工智能焦虑外包器，把焦虑交给AI，轻松多了！🌊✨ qingxihub.com/anxiety';
            window.open(`https://service.weibo.com/share/share.php?content=${encodeURIComponent(text)}`, '_blank');
        }

        function generateShareImage() {
            const anxiety = document.getElementById('anxiety').value.trim() || '生活中的小焦虑';
            const result = document.getElementById('resultText').textContent || '点击上方按钮试试';
            
            // 3:4 尺寸
            const canvas = document.createElement('canvas');
            canvas.width = 600;
            canvas.height = 800;
            const ctx = canvas.getContext('2d');
            
            // 渐变背景
            const gradient = ctx.createLinearGradient(0, 0, 600, 800);
            gradient.addColorStop(0, '#f0fdfa');
            gradient.addColorStop(1, '#ccfbf1');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 600, 800);
            
            // 装饰圆
            ctx.beginPath();
            ctx.arc(550, 50, 160, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 137, 123, 0.12)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(-50, 750, 120, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(0, 137, 123, 0.08)';
            ctx.fill();
            
            // 标题区块
            ctx.fillStyle = 'rgba(0, 137, 123, 0.1)';
            roundRect(ctx, 40, 60, 520, 120, 20);
            ctx.fill();
            
            // 标题
            ctx.fillStyle = '#00897b';
            ctx.font = 'bold 50px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif';
            ctx.fillText('🌊 焦虑外包器', 60, 145);
            
            // 副标题
            ctx.fillStyle = '#4db6ac';
            ctx.font = '22px -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif';
            ctx.fillText('把焦虑交给AI，你只需要放心', 60, 185);
            
            // 分隔线
            ctx.strokeStyle = '#b2dfdb';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(40, 220);
            ctx.lineTo(560, 220);
            ctx.stroke();
            
            // 我的焦虑卡片
            ctx.fillStyle = 'white';
            roundRect(ctx, 40, 260, 520, 160, 20);
            ctx.fill();
            ctx.strokeStyle = '#e0f2f1';
            ctx.lineWidth = 1;
            ctx.stroke();
            
            ctx.fillStyle = '#666';
            ctx.font = '20px -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif';
            ctx.fillText('我的焦虑', 60, 300);
            
            ctx.fillStyle = '#333';
            ctx.font = 'bold 26px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif';
            const anxietyLines = wrapTextNice(ctx, anxiety, 480);
            let y = 340;
            anxietyLines.forEach(line => {
                ctx.fillText(line, 60, y);
                y += 38;
            });
            
            // AI回复卡片
            ctx.fillStyle = 'white';
            roundRect(ctx, 40, 460, 520, 160, 20);
            ctx.fill();
            ctx.strokeStyle = '#e0f2f1';
            ctx.lineWidth = 1;
            ctx.stroke();
            
            ctx.fillStyle = '#00897b';
            ctx.font = '20px -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif';
            ctx.fillText('✨ AI说', 60, 500);
            
            ctx.fillStyle = '#333';
            ctx.font = 'bold 26px -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif';
            const resultLines = wrapTextNice(ctx, result, 480);
            y = 540;
            resultLines.forEach(line => {
                ctx.fillText(line, 60, y);
                y += 38;
            });
            
            // 标签
            ctx.fillStyle = '#00897b';
            ctx.font = 'bold 20px -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif';
            ctx.fillText('#焦虑外包  #AI提效  #清溪AI', 60, 670);
            
            // 底部栏
            ctx.fillStyle = '#00897b';
            roundRect(ctx, 160, 690, 280, 80, 40);
            ctx.fill();
            
            // 底部文字
            ctx.fillStyle = 'white';
            ctx.font = 'bold 22px -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('qingxihub.com/anxiety', 300, 745);
            ctx.textAlign = 'left';
            
            // 下载
            const link = document.createElement('a');
            link.download = '焦虑外包分享.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
        
        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
        }
        
        function wrapTextNice(ctx, text, maxWidth) {
            if (text.length <= 16) return [text];
            const chars = text.split('');
            const lines = [];
            let currentLine = '';
            for (let char of chars) {
                const testLine = currentLine + char;
                if (ctx.measureText(testLine).width > maxWidth) {
                    lines.push(currentLine);
                    currentLine = char;
                } else {
                    currentLine = testLine;
                }
            }
            if (currentLine) lines.push(currentLine);
            return lines.slice(0, 3);
        }
    </script>
</body>
</html>
